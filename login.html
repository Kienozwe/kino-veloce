<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINOXE — Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root { --sidebar: 0px; }

body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.login-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 70% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 50%),
    var(--black);
}
.login-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 59px, rgba(255,255,255,0.015) 59px, rgba(255,255,255,0.015) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.015) 59px, rgba(255,255,255,0.015) 60px);
}

.login-wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 440px; padding: 24px;
}

.login-card {
  background: var(--charcoal);
  border: 1px solid var(--border-lt);
  border-radius: 12px;
  padding: 48px 44px;
  box-shadow: var(--sh);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-logo {
  text-align: center; margin-bottom: 36px;
}
.login-logo-text {
  font-family: var(--font-d); font-size: 40px; letter-spacing: 8px;
  color: var(--white); font-weight: 600; display: block;
}
.login-logo-text span { color: var(--gold); }
.login-logo-sub {
  font-size: 10px; letter-spacing: 4px; color: var(--muted);
  text-transform: uppercase; display: block; margin-top: 6px;
}

.login-divider {
  width: 40px; height: 1px; background: var(--gold); margin: 0 auto 32px;
  opacity: 0.5;
}

.login-title {
  font-family: var(--font-d); font-size: 26px; color: var(--white);
  margin-bottom: 4px;
}
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; }

.form-group { margin-bottom: 18px; }

.input-wrap { position: relative; }
.input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 15px; pointer-events: none;
}
.form-control.with-icon { padding-left: 42px; }

.login-error {
  background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3);
  color: #e74c3c; padding: 12px 16px; border-radius: var(--r);
  font-size: 12px; margin-bottom: 18px; display: none;
  animation: shake 0.4s ease;
}
.login-error.show { display: block; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-6px); }
  40%,80% { transform: translateX(6px); }
}

.login-footer {
  text-align: center; margin-top: 28px;
  font-size: 12px; color: var(--muted);
}
.login-footer a { color: var(--gold); transition: opacity 0.2s; }
.login-footer a:hover { opacity: 0.75; }

.demo-hint {
  background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2);
  border-radius: var(--r); padding: 10px 14px; margin-top: 20px;
  font-size: 11px; color: var(--muted); text-align: center;
}
.demo-hint strong { color: var(--gold); }
</style>
</head>
<body>

<div class="login-bg"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-text">KINO<span>XE</span></span>
      <span class="login-logo-sub">Admin Portal</span>
    </div>
    <div class="login-divider"></div>

    <h2 class="login-title">Welcome Back</h2>
    <p class="login-sub">Sign in to access the admin dashboard</p>

    <div class="login-error" id="login-error">
      ✕ &nbsp;Invalid username or password. Please try again.
    </div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <span class="input-icon">◈</span>
          <input type="text" id="username" class="form-control with-icon"
            placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">◉</span>
          <input type="password" id="password" class="form-control with-icon"
            placeholder="Enter your password" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn btn-gold btn-block btn-lg" id="login-btn" style="margin-top:8px;">
        Sign In →
      </button>
    </form>

    <div class="demo-hint">
      Demo credentials — Username: <strong>admin</strong> &nbsp;·&nbsp; Password: <strong>secret HAHAHAH</strong>
    </div>

    <div class="login-footer">
      <a href="index.html">← Back to User Site</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
/* Redirect if already logged in */
document.addEventListener('DOMContentLoaded', () => {
  if (DB.Auth.isLoggedIn()) {
    window.location.href = 'admin.html';
  }
});

function doLogin(e) {
  e.preventDefault();
  const btn = $('login-btn');
  const username = $('username').value.trim();
  const password = $('password').value.trim();
  const errEl    = $('login-error');

  btn.textContent = 'Signing in…'; btn.disabled = true;
  errEl.classList.remove('show');

  // Simulate slight delay for UX
  setTimeout(() => {
    const session = DB.Auth.login(username, password);
    if (session) {
      showToast('Welcome back, ' + session.name + '!', 'ok');
      setTimeout(() => window.location.href = 'admin.html', 700);
    } else {
      errEl.classList.add('show');
      btn.textContent = 'Sign In →'; btn.disabled = false;
      $('password').value = '';
      $('password').focus();
    }
  }, 600);
}
</script>
</body>
</html>
